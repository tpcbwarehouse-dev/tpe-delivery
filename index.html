<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPE — ใบส่งมอบงาน</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');

/* ===== APP SHELL ===== */
:root{
  --bg:#0f1117;--surface:#1a1d27;--card:#21242f;--border:#2e3241;
  --accent:#3b82f6;--accent2:#60a5fa;--text:#e8eaf0;--muted:#8892a4;
  --success:#10b981;--danger:#ef4444;--label:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.brand-pill{display:flex;align-items:center;gap:10px;padding:13px 0;margin-right:20px;}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff;flex-shrink:0;}
.brand-name{font-size:14px;font-weight:700;}
.tabs{display:flex;}
.tab{padding:15px 18px;font-family:'Sarabun',sans-serif;font-size:13.5px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .2s,border-color .2s;white-space:nowrap;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.tab-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:5px;}
.panel{display:none;padding:20px 16px 60px;}
.panel.active{display:block;}
.container{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
.card-title{font-size:12px;font-weight:600;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.card-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;}
.required-mark{color:var(--danger);margin-left:3px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.span-2{grid-column:span 2;}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-size:12px;color:var(--label);font-weight:500;}
input,textarea{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;padding:9px 11px;transition:border-color .2s,box-shadow .2s;outline:none;width:100%;}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
textarea{resize:vertical;min-height:68px;}
.optional-label{font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.optional-label::before,.optional-label::after{content:'';flex:1;height:1px;background:var(--border);}
.optional-section{opacity:.75;}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--surface);position:relative;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(59,130,246,.06);}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:28px;margin-bottom:6px;opacity:.6;}
.drop-text{font-size:14px;color:var(--muted);}
.drop-hint{font-size:11px;color:var(--muted);margin-top:2px;opacity:.6;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:10px;}
.photo-thumb{position:relative;aspect-ratio:4/3;border-radius:7px;overflow:hidden;border:1px solid var(--border);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-thumb .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:10px;}
.photo-thumb .rm:hover{background:var(--danger);}
.photo-count{font-size:12px;color:var(--muted);margin-top:5px;}
.btn-generate{width:100%;background:linear-gradient(135deg,var(--accent) 0%,#6366f1 100%);border:none;border-radius:11px;color:#fff;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;padding:14px 24px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(59,130,246,.35);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-generate:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,130,246,.45);}
.btn-generate:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.status-msg{text-align:center;font-size:13px;color:var(--muted);margin-top:6px;min-height:18px;}
.status-msg.success{color:var(--success);}
.status-msg.error{color:var(--danger);}
/* History */
.hist-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.hist-search{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:8px 11px;outline:none;}
.hist-search:focus{border-color:var(--accent);}
.hist-empty{text-align:center;padding:50px 20px;color:var(--muted);}
.hist-empty .e-icon{font-size:40px;margin-bottom:10px;opacity:.4;}
.hist-item{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s;}
.hist-item:hover{border-color:rgba(59,130,246,.35);}
.hist-item+.hist-item{margin-top:9px;}
.hist-num{font-size:11px;font-weight:700;color:var(--accent2);background:rgba(59,130,246,.12);padding:3px 8px;border-radius:5px;white-space:nowrap;}
.hist-info{flex:1;min-width:0;}
.hist-title{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-meta{font-size:12px;color:var(--muted);}
.hist-actions{display:flex;gap:5px;flex-shrink:0;}
.btn-sm{padding:5px 11px;border-radius:6px;border:none;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-view{background:rgba(59,130,246,.15);color:var(--accent2);}
.btn-view:hover{background:rgba(59,130,246,.25);}
.btn-print{background:rgba(16,185,129,.15);color:var(--success);}
.btn-print:hover{background:rgba(16,185,129,.25);}
.btn-del{background:rgba(239,68,68,.1);color:var(--danger);}
.btn-del:hover{background:rgba(239,68,68,.2);}
.btn-edit{background:rgba(245,158,11,.15);color:#d97706;}
.btn-edit:hover{background:rgba(245,158,11,.25);}
.btn-copy{background:rgba(139,92,246,.15);color:#7c3aed;}
.btn-copy:hover{background:rgba(139,92,246,.25);}
.btn-del:hover{background:rgba(239,68,68,.2);}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.hidden{display:none;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:720px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.5);}
.modal-toolbar{background:#f8f8f8;border-bottom:1px solid #e0e0e0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.modal-toolbar-title{font-size:14px;font-weight:600;color:#333;}
.modal-toolbar-actions{display:flex;gap:8px;}
.btn-toolbar{padding:7px 16px;border-radius:6px;border:none;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.btn-close-modal{background:#eee;color:#555;}
.btn-close-modal:hover{background:#ddd;}
.btn-print-modal{background:#10b981;color:#fff;}
.btn-print-modal:hover{background:#059669;}
.modal-body{padding:0;max-height:80vh;overflow-y:auto;background:#e8e8e8;}

/* ===== DOCUMENT — TPE Delivery Note ===== */
.doc-page {
  background:#fff;
  font-family:'Sarabun',sans-serif;
  font-size:13pt;
  line-height:1.5;
  color:#1a1a1a;
}

/* HEADER BAND */
.doc-header {
  background:#3d1f0a;
  padding:18px 28px 14px;
  position:relative;
  overflow:hidden;
}
.doc-header::before {
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    -55deg,
    transparent,transparent 18px,
    rgba(255,255,255,.03) 18px,rgba(255,255,255,.03) 19px
  );
}
.doc-header-inner {
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
}
.doc-company-name {
  font-size:20pt;
  font-weight:700;
  color:#f5e6c8;
  letter-spacing:.04em;
  line-height:1.15;
}
.doc-company-name em {
  font-style:normal;
  color:#e8c068;
}
.doc-company-sub {
  font-size:10pt;
  color:rgba(245,230,200,.65);
  margin-top:3px;
  letter-spacing:.02em;
}
.doc-header-right {
  text-align:right;
  flex-shrink:0;
}
.doc-header-contact {
  font-size:9pt;
  color:rgba(245,230,200,.7);
  line-height:1.7;
}
.doc-header-contact b { color:rgba(245,230,200,.95); }
.doc-header-taxid {
  font-size:8.5pt;
  color:rgba(232,192,104,.8);
  margin-top:2px;
}

/* GOLD RULE */
.doc-gold-rule {
  height:4px;
  background:linear-gradient(90deg,#7a3e10 0%,#c9841a 25%,#e8c068 50%,#c9841a 75%,#7a3e10 100%);
}

/* DOC ID STRIPE */
.doc-id-stripe {
  background:#f9f4ec;
  border-bottom:1px solid #e2d4bc;
  padding:8px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.doc-id-label {
  font-size:8.5pt;
  color:#8a6a40;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.doc-id-value {
  font-size:13pt;
  font-weight:700;
  color:#3d1f0a;
  letter-spacing:.05em;
}

/* TITLE */
.doc-title-wrap {
  text-align:center;
  padding:14px 28px 10px;
  border-bottom:1px solid #e8dcc8;
}
.doc-title {
  font-size:22pt;
  font-weight:700;
  color:#3d1f0a;
  letter-spacing:.05em;
}
.doc-title-en {
  font-size:10pt;
  color:#9a7a52;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-top:2px;
}

/* BODY */
.doc-body { padding:14px 24px 12px; }

/* INFO TABLE */
.doc-info-table {
  width:100%;
  border-collapse:collapse;
  margin-bottom:14px;
  border:2px solid #8B6530;
}
.doc-info-table td {
  padding:8px 12px;
  border:1.5px solid #9B7040;
  vertical-align:middle;
}
.cell-label {
  background:#f0e6d2;
  font-weight:700;
  font-size:11pt;
  text-align:center;
  width:72px;
  color:#3d1f0a;
  line-height:1.3;
}
.cell-label small {
  display:block;
  font-weight:500;
  font-size:10pt;
  color:#7a5c30;
  margin-top:1px;
}
.cell-main {
  font-size:14pt;
  font-weight:600;
  text-align:center;
  color:#111;
}
.cell-tag {
  background:#3d1f0a;
  color:#f5e6c8;
  font-weight:700;
  font-size:10.5pt;
  text-align:center;
  width:52px;
  letter-spacing:.02em;
}
.cell-val {
  font-size:11.5pt;
  text-align:center;
  width:110px;
  font-weight:600;
  color:#3d1f0a;
  white-space:nowrap;
}

/* SPEC */
.doc-spec-section {
  border:1.5px solid #d4bc96;
  border-radius:6px;
  overflow:hidden;
  margin-bottom:14px;
}
.doc-spec-title {
  background:#f0e6d2;
  border-bottom:1px solid #d4bc96;
  padding:6px 14px;
  font-size:9pt;
  font-weight:700;
  color:#5a3510;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.doc-spec-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:0;
  padding:10px 14px;
  background:#fff;
  gap:8px 20px;
}
.doc-spec-item { display:flex; flex-direction:column; gap:2px; }
.doc-spec-key {
  font-size:8pt;
  color:#9a7a52;
  font-weight:700;
  letter-spacing:.05em;
  text-transform:uppercase;
}
.doc-spec-val {
  font-size:12pt;
  color:#1a1a1a;
  font-weight:500;
  border-bottom:1.5px solid #d4bc96;
  padding-bottom:2px;
}

/* SCOPE */
.doc-scope-section { margin-bottom:12px; }
.doc-section-label {
  font-size:9pt;
  font-weight:700;
  color:#5a3510;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:5px;
  display:flex;
  align-items:center;
  gap:8px;
}
.doc-section-label::after {
  content:'';
  flex:1;
  height:1px;
  background:#d4bc96;
}
.doc-scope-box {
  border:1.5px solid #d4bc96;
  border-left:4px solid #c9841a;
  border-radius:0 5px 5px 0;
  padding:9px 14px;
  font-size:12.5pt;
  color:#222;
  line-height:1.65;
  background:#fffdf8;
}

/* EQUIP */
.doc-equip-box {
  border:1.5px solid #d4bc96;
  border-radius:5px;
  min-height:38px;
  background:#fffdf8;
  margin-bottom:14px;
}

/* COMPLETION */
.doc-completion {
  display:flex;
  border:1.5px solid #d4bc96;
  border-radius:6px;
  overflow:hidden;
  margin-bottom:14px;
}
.doc-completion-text {
  flex:1;
  padding:12px 16px;
  font-size:12.5pt;
  color:#333;
  line-height:1.65;
  border-right:1px solid #d4bc96;
}
.doc-sig-block {
  text-align:center;
  padding:10px 22px;
  background:#f9f4ec;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:175px;
  gap:3px;
}
.doc-sig-img {
  height:46px;
  object-fit:contain;
  margin-bottom:2px;
}
.doc-sig-name { font-size:11.5pt; font-weight:600; color:#1a1a1a; }
.doc-sig-role { font-size:10.5pt; color:#7a5c30; }

/* PHOTOS */
.doc-photos-section { margin-bottom:14px; }
.doc-photos-next-page { page-break-before: always; padding-top: 8px; }

/* Photo layout templates */
.doc-photos { display:grid; gap:5px; }
.doc-photos.cols-1 { grid-template-columns:1fr; }
.doc-photos.cols-2 { grid-template-columns:1fr 1fr; }
.doc-photos.cols-3 { grid-template-columns:1fr 1fr 1fr; }
.doc-photos.cols-4 { grid-template-columns:1fr 1fr 1fr 1fr; }

/* Template: 1 big + rest small */
.doc-photos.tpl-hero .hero-photo { grid-column: 1 / -1; }
.doc-photos.tpl-hero { grid-template-columns: repeat(3, 1fr); }

/* Template: 2 rows big/small */
.doc-photos.tpl-rows { grid-template-columns: 1fr 1fr; }
.doc-photos.tpl-rows .big-photo { grid-column: span 2; }

/* photo selector UI */
.photo-layout-bar {
  display:flex; gap:6px; align-items:center;
  margin-bottom:10px; flex-wrap:wrap;
}
.layout-btn {
  padding:5px 10px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface); color:var(--muted);
  font-family:'Sarabun',sans-serif; font-size:11px; cursor:pointer;
  transition:all .15s; display:flex; align-items:center; gap:4px;
}
.layout-btn:hover { border-color:var(--accent); color:var(--text); }
.layout-btn.active { border-color:#c9841a; background:rgba(201,132,26,.15); color:#f5e6c8; }
.layout-preview {
  display:grid; gap:1px; width:28px; height:20px; flex-shrink:0;
}
.layout-preview span { background:rgba(201,132,26,.5); border-radius:1px; }
.doc-photos {
  display:grid;
  gap:5px;
}
.doc-photos.cols-1 { grid-template-columns: 1fr; }
.doc-photos.cols-2 { grid-template-columns: 1fr 1fr; }
.doc-photos.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.doc-photos.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.doc-photos img {
  width:100%;
  aspect-ratio:4/3;
  object-fit:cover;
  object-position: center center;
  border-radius:4px;
  border:1px solid #d4bc96;
  display:block;
  cursor:grab;
  transition: outline .15s;
}
.doc-photos img:active { cursor:grabbing; }
.doc-photos img.selected-photo {
  outline: 2px solid #c9841a;
  outline-offset: 1px;
}
/* 1 รูป — สูงขึ้น */
.doc-photos.cols-1 img { aspect-ratio: 16/9; }
/* 2 คอลัมน์ — สูงขึ้นหน่อย */
.doc-photos.cols-2 img { aspect-ratio: 3/2; }

/* photo position toolbar */
.photo-pos-toolbar {
  position:fixed;
  background:rgba(30,20,10,.92);
  border:1px solid #c9841a;
  border-radius:10px;
  padding:8px 12px;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:500;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  font-family:'Sarabun',sans-serif;
  font-size:12px;
  color:#f5e6c8;
}
.photo-pos-toolbar.hidden { display:none; }
.pos-btn {
  background:rgba(201,132,26,.2);
  border:1px solid #c9841a;
  border-radius:5px;
  color:#f5e6c8;
  font-size:14px;
  width:28px;height:28px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.pos-btn:hover { background:rgba(201,132,26,.4); }
.pos-close {
  background:rgba(239,68,68,.2);
  border:1px solid #ef4444;
  border-radius:5px;
  color:#fca5a5;
  font-size:11px;
  padding:2px 8px;
  cursor:pointer;
  margin-left:4px;
}

/* FOOTER */
.doc-footer {
  background:#3d1f0a;
  padding:10px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.doc-footer-brand {
  color:#f5e6c8;
  font-size:10.5pt;
  font-weight:700;
  letter-spacing:.04em;
}
.doc-footer-brand small {
  display:block;
  font-size:8pt;
  color:rgba(245,230,200,.6);
  font-weight:400;
  margin-top:1px;
}
.doc-footer-contact {
  font-size:8.5pt;
  color:rgba(245,230,200,.75);
  text-align:right;
  line-height:1.8;
  display:flex;
  flex-direction:column;
}
.doc-footer-contact span { display:flex; align-items:center; justify-content:flex-end; gap:5px; }

/* MODAL full screen */
.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  z-index:200;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.modal-overlay.hidden { display:none; }
.modal {
  display:flex;
  flex-direction:column;
  width:100%;
  height:100%;
  max-width:none;
  border-radius:0;
  overflow:hidden;
  background:#1a1a1a;
}
.modal-toolbar {
  background:#3d1f0a;
  border-bottom:2px solid #c9841a;
  padding:10px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.modal-toolbar-title { font-size:14px; font-weight:600; color:#f5e6c8; }
.modal-toolbar-actions { display:flex; gap:8px; }
.btn-toolbar { padding:7px 16px; border-radius:6px; border:none; font-family:'Sarabun',sans-serif; font-size:13px; font-weight:600; cursor:pointer; }
.btn-close-modal { background:rgba(255,255,255,.12); color:#f5e6c8; }
.btn-close-modal:hover { background:rgba(255,255,255,.2); }
.btn-print-modal { background:#c9841a; color:#fff; }
.btn-print-modal:hover { background:#b87316; }
.modal-body {
  flex:1;
  overflow-y:auto;
  background:#2c1a08;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px 12px;
}
/* wrapper สำหรับ scale */
.modal-doc-wrapper {
  width:100%;
  display:flex;
  justify-content:center;
}
.modal-body .doc-page {
  width:210mm;
  max-width:calc(100vw - 32px);
  box-shadow:0 4px 32px rgba(0,0,0,.6);
  margin:0 auto;
  border-radius:3px;
  overflow:hidden;
}

@media print {
  body { background:#fff !important; margin:0; padding:0; }
  .app-header,.panel:not(#panelPrint),.modal-overlay,.modal-toolbar { display:none !important; }
  #panelPrint { display:block !important; padding:0 !important; }

  /* ซ่อน screen header/footer ตอนพิมพ์ */
  .doc-header,.doc-footer,.doc-gold-rule { display:none !important; }

  /* แสดง print header/footer */
  .print-header { display:block !important; }
  .print-footer { display:block !important; }

  /* Fixed header/footer ทุกหน้า */
  .print-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
  }
  .print-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 999;
  }

  /* เว้นที่ให้ header/footer */
  .doc-page {
    margin-top: 0;
  }
  /* ไม่ต้องเพิ่ม padding เพราะ print-header fixed จัดการให้ */
  #panelPrint {
    padding-top: 0 !important;
    padding-bottom: 0 !important;
  }

  /* รูปภาพขึ้นหน้าใหม่ */
  .doc-photos-section { page-break-before: always; padding-top: 0; }

  /* ไม่ตัดกลางกล่อง */
  .doc-info-table, .doc-spec-section, .doc-completion,
  .doc-scope-box, .doc-equip-section { page-break-inside: avoid; }

  /* สี print */
  .doc-header,.doc-gold-rule,.doc-id-stripe,.doc-footer,
  .doc-spec-title,.cell-label,.cell-tag,
  .print-header,.print-footer,.print-header-inner,.print-footer-inner {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  @page {
    size: A4;
    margin: 10mm 8mm;
    /* ปิด browser header/footer */
  }
}

/* ===== PRINT HEADER/FOOTER (hidden on screen) ===== */

.print-footer { display: none; }

/* ===== BILLING STATUS ===== */
.bill-item{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:9px;transition:border-color .2s;}
.bill-item:hover{border-color:rgba(201,132,26,.4);}
.bill-header{display:flex;align-items:flex-start;gap:12px;}
.bill-doc-num{font-size:11px;font-weight:700;color:#c9841a;background:rgba(201,132,26,.12);padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
.bill-info{flex:1;min-width:0;}
.bill-title{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bill-meta{font-size:12px;color:var(--muted);}
.bill-status-wrap{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.status-draft    {background:rgba(148,163,184,.15);color:#94a3b8;}
.status-bill1    {background:rgba(245,158,11,.15);color:#f59e0b;}
.status-bill2    {background:rgba(59,130,246,.15);color:#60a5fa;}
.status-complete {background:rgba(16,185,129,.15);color:#10b981;}
.bill-controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.bill-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;padding:5px 8px;outline:none;cursor:pointer;}
.bill-select:focus{border-color:#c9841a;}
.btn-bill{padding:5px 12px;border-radius:6px;border:none;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-bill-save{background:rgba(201,132,26,.2);color:#c9841a;border:1px solid rgba(201,132,26,.3);}
.btn-bill-save:hover{background:rgba(201,132,26,.35);}
.bill-printed{font-size:11px;color:var(--muted);}
.bill-printed.yes{color:var(--success);}
.bill-summary{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.summary-chip{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;}
.chip-draft    {background:rgba(148,163,184,.1);color:#94a3b8;}
.chip-bill1    {background:rgba(245,158,11,.1);color:#f59e0b;}
.chip-bill2    {background:rgba(59,130,246,.1);color:#60a5fa;}
.chip-complete {background:rgba(16,185,129,.1);color:#10b981;}
.bill-filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Sarabun',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
.filter-chip:hover{border-color:var(--accent);color:var(--text);}
.filter-chip.active{border-color:#c9841a;background:rgba(201,132,26,.12);color:#c9841a;}

/* ===== PHOTO POSITION CONTROL ===== */
.photo-thumb-wrap {
  position: relative;
  aspect-ratio: 4/3;
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface);
}
.photo-thumb-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  cursor: ns-resize;
  user-select: none;
}
.photo-thumb-wrap .rm {
  position: absolute; top: 3px; right: 3px;
  background: rgba(0,0,0,.7); border: none; border-radius: 50%;
  width: 20px; height: 20px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; color: #fff; font-size: 10px;
}
.photo-thumb-wrap .rm:hover { background: var(--danger); }
.photo-pos-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.55); padding: 3px 6px;
  display: flex; align-items: center; gap: 5px;
  opacity: 0; transition: opacity .2s;
}
.photo-thumb-wrap:hover .photo-pos-bar { opacity: 1; }
.photo-pos-bar input[type=range] {
  flex: 1; height: 3px; cursor: pointer;
  background: none; border: none; padding: 0; outline: none;
}
.photo-pos-label { font-size: 9px; color: #fff; white-space: nowrap; }

/* ===== ENGINEER PROFILES ===== */
.eng-selector{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.eng-avatar{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:8px 12px;border-radius:10px;
  border:2px solid var(--border);background:var(--surface);
  transition:border-color .2s,background .2s;min-width:80px;
}
.eng-avatar:hover{border-color:var(--accent);background:rgba(59,130,246,.06);}
.eng-avatar.selected{border-color:#c9841a;background:rgba(201,132,26,.08);}
.eng-avatar-sig{height:32px;object-fit:contain;margin-bottom:2px;}
.eng-avatar-sig-placeholder{
  height:32px;width:56px;border-radius:4px;
  background:var(--border);display:flex;align-items:center;
  justify-content:center;font-size:18px;margin-bottom:2px;
}
.eng-avatar-name{font-size:11px;color:var(--label);text-align:center;line-height:1.3;}
.eng-add-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:8px 12px;border-radius:10px;
  border:2px dashed var(--border);background:transparent;
  color:var(--muted);font-size:12px;min-width:80px;
  transition:border-color .2s,color .2s;font-family:'Sarabun',sans-serif;
}
.eng-add-btn:hover{border-color:var(--accent);color:var(--accent2);}
.eng-add-icon{font-size:22px;line-height:1;}

/* Modal สำหรับเพิ่ม/แก้ engineer */
.eng-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.eng-modal-overlay.hidden{display:none;}
.eng-modal{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  width:100%;max-width:380px;padding:24px;
}
.eng-modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text);}
.eng-modal .field{margin-bottom:14px;}
.eng-modal label{font-size:12px;color:var(--label);font-weight:500;display:block;margin-bottom:5px;}
.eng-modal input{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:'Sarabun',sans-serif;
  font-size:15px;padding:9px 11px;outline:none;}
.eng-modal input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.eng-sig-upload{
  border:2px dashed var(--border);border-radius:7px;padding:10px 14px;
  background:var(--surface);cursor:pointer;position:relative;
  min-height:52px;display:flex;align-items:center;gap:10px;transition:border-color .2s;
}
.eng-sig-upload:hover{border-color:var(--accent);}
.eng-sig-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.eng-sig-preview{height:36px;object-fit:contain;}
.eng-modal-btns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.btn-cancel{background:var(--surface);color:var(--muted);border:1px solid var(--border);
  border-radius:7px;font-family:'Sarabun',sans-serif;font-size:13px;padding:8px 16px;cursor:pointer;}
.btn-save-eng{background:linear-gradient(135deg,#c9841a,#8B6530);color:#fff;border:none;
  border-radius:7px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;
  padding:8px 18px;cursor:pointer;}
.btn-del-eng{background:rgba(239,68,68,.1);color:var(--danger);border:none;
  border-radius:7px;font-family:'Sarabun',sans-serif;font-size:13px;
  padding:8px 14px;cursor:pointer;margin-right:auto;}

/* ===== AUTOCOMPLETE ===== */
.autocomplete-wrap { position: relative; }
.autocomplete-list {
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: 8px;
  z-index: 50;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  margin-top: 3px;
}
.autocomplete-item {
  padding: 9px 13px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover, .autocomplete-item.active { background: rgba(59,130,246,.12); }
.autocomplete-item .ac-code {
  font-size: 11px;
  color: var(--accent2);
  background: rgba(59,130,246,.12);
  padding: 2px 7px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.autocomplete-item .ac-name {
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@media(max-width:580px){.grid-2,.grid-3{grid-template-columns:1fr;}.span-2{grid-column:span 1;}.hist-actions{flex-wrap:wrap;}}

// Tabs
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const tabMap = { form: 0, history: 1, billing: 2 };
  const tabs = document.querySelectorAll('.tab');
  if (tabs[tabMap[tab]]) tabs[tabMap[tab]].classList.add('active');
  const panelMap = { form: 'panelForm', history: 'panelHistory', billing: 'panelBilling' };
  const panel = document.getElementById(panelMap[tab]);
  if (panel) panel.classList.add('active');
  if (tab === 'history') loadAndRenderHistory();
  if (tab === 'billing') loadAndRenderBilling();
}

async function loadAndRenderHistory() {
  const list = document.getElementById('histList');

  // แสดง metadata local ก่อน (ไม่มีรูป แต่เร็ว)
  const local = JSON.parse(localStorage.getItem('tpe_deliveries_meta') || '[]');
  window._allRecords = local;
  renderHistory();

  // ถ้าไม่มี API ก็จบแค่นี้
  if (!API_URL || API_URL.includes('YOUR_APPS')) return;

  // ดึงจาก Sheet
  try {
    list.insertAdjacentHTML('afterbegin',
      '<div id="syncMsg" style="font-size:11px;color:var(--muted);margin-bottom:8px;text-align:center;">🔄 กำลัง sync...</div>');
    const res = await fetch(API_URL + '?method=GET');
    const records = await res.json();
    document.getElementById('syncMsg')?.remove();
    if (Array.isArray(records) && records.length >= 0) {
      window._allRecords = records;
      // เก็บแค่ metadata (ไม่มีรูป) เพื่อไม่ให้ localStorage เต็ม
      const meta = records.map(r => {
        const m = Object.assign({}, r);
        delete m.photos; delete m.sigImg;
        return m;
      });
      try { localStorage.setItem('tpe_deliveries_meta', JSON.stringify(meta.slice(0,200))); } catch(e) {}
      updateBadge();
      renderHistory();
    }
  } catch(e) {
    document.getElementById('syncMsg')?.remove();
    console.warn('Sync failed:', e.message);
  }
}

// Photos
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
document.getElementById('photoInput').addEventListener('change', e => handleFiles(e.target.files));

function resizeImg(dataUrl, maxW) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const s = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * s); c.height = Math.round(img.height * s);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', 0.82));
    };
    img.src = dataUrl;
  });
}
function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = async ev => {
      const resized = await resizeImg(ev.target.result, 900);
      photos.push({ dataUrl: resized });
      renderGrid();
    };
    r.readAsDataURL(f);
  });
}
let currentLayout = 'auto';

function setLayout(layout) {
  currentLayout = layout;
  document.querySelectorAll('.layout-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.layout === layout);
  });
}

function removePhoto(i) { photos.splice(i,1); renderGrid(); }
function renderGrid() {
  document.getElementById('photoGrid').innerHTML = photos.map((p,i) => {
    const pos = p.position || 50;
    return `<div class="photo-thumb-wrap">
      <img src="${p.dataUrl}" style="object-position: center ${pos}%"
           id="photo_img_${i}" title="ลากเพื่อเลื่อนรูปขึ้น-ลง">

// Validate
function validate() {
  const req = ['docNumber','jobNumber','date','jobName','customerCode','customerName','scope','engineer'];
  for (const id of req) {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      el.style.borderColor = 'var(--danger)'; el.focus();
      setTimeout(() => el.style.borderColor = '', 2000);
      return false;
    }
  }
  return true;
}

function buildDocHTML(r) {
  const yr = new Date(r.createdAt || Date.now()).getFullYear();
  const scopeLines = (r.scope || '-').split('\n').map(l => l.trim()).filter(Boolean);
  const scopeHTML = scopeLines.map(l => `<div>${l}</div>`).join('');
  const sigSrc = r.sigImg || getSig();
  const docNum = r.docNumber || '';

  // format วันที่ — รองรับทั้ง dd/mm/yyyy และ ISO string
  function formatDate(d) {
    if (!d) return '';
    // ถ้าเป็น ISO string (มี T หรือ -)
    if (d.includes('T') || (d.includes('-') && d.length > 10)) {
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return String(dt.getDate()).padStart(2,'0') + '/' +
             String(dt.getMonth()+1).padStart(2,'0') + '/' +
             dt.getFullYear();
    }
    return d;
  }
  const displayDate = formatDate(r.date);
  const equipLines = Array(5).fill('<div class="doc-equip-line"></div>').join('');

  // คำนวณ grid columns ตามจำนวนรูป
  function getPhotoCols(n) {
    if (n === 1) return 1;      // 1 รูป — เต็มความกว้าง
    if (n === 2) return 2;      // 2 รูป — 2 คอลัมน์ สูง
    if (n <= 4) return 2;       // 3-4 รูป — 2 คอลัมน์ 2 แถว
    if (n <= 6) return 3;       // 5-6 รูป — 3 คอลัมน์ 2 แถว
    if (n <= 9) return 3;       // 7-9 รูป — 3 คอลัมน์ 3 แถว
    return 3;                   // 10-12 รูป — 3 คอลัมน์ 4 แถว (เต็ม A4)
  }

  function getImgTag(p, extraStyle) {
    const pos = p && p.position !== undefined ? p.position : 50;
    return `<img src="${p.dataUrl}" style="object-position:center ${pos}%;${extraStyle||''}">`;
  }

  function buildPhotosHTML(photos, layout) {
    if (!photos || !photos.length) return '';
    layout = layout || 'auto';
    const pages = [];
    for (let i = 0; i < photos.length; i += 12) pages.push(photos.slice(i, i + 12));

    const BASE = 'width:100%;object-fit:cover;border-radius:4px;border:1px solid #d4bc96;display:block;';

    return pages.map((pg, pageIdx) => {
      const isFirst = pageIdx === 0;
      const label = isFirst ? '<div class="doc-section-label" style="margin-bottom:8px;">รูปภาพประกอบงาน — Site Photos</div>' : '';
      let grid = '';

      if (layout === 'hero' && pg.length >= 2) {
        const rest = pg.slice(1);
        grid = `<div style="display:grid;gap:5px;">
          <div>${getImgTag(pg[0], BASE+'aspect-ratio:16/7;')}</div>
          <div style="display:grid;grid-template-columns:repeat(${Math.min(rest.length,4)},1fr);gap:5px;">
            ${rest.map(p => getImgTag(p, BASE+'aspect-ratio:4/3;')).join('')}
          </div></div>`;

      } else if (layout === 'mosaic' && pg.length >= 2) {
        let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">';
        for (let i = 0; i < pg.length; i += 3) {
          html += `<div style="grid-row:span 2;">${getImgTag(pg[i], BASE+'height:100%;min-height:150px;')}</div>`;
          if (pg[i+1]) html += getImgTag(pg[i+1], BASE+'aspect-ratio:4/3;');
          if (pg[i+2]) html += getImgTag(pg[i+2], BASE+'aspect-ratio:4/3;');
        }
        grid = html + '</div>';

      } else if (layout === 'rows' && pg.length >= 3) {
        const top = pg.slice(0, Math.ceil(pg.length/3));
        const bot = pg.slice(Math.ceil(pg.length/3));
        grid = `<div style="display:grid;gap:5px;">
          <div style="display:grid;grid-template-columns:repeat(${top.length},1fr);gap:5px;">
            ${top.map(p => getImgTag(p, BASE+'aspect-ratio:3/2;')).join('')}
          </div>
          ${bot.length ? `<div style="display:grid;grid-template-columns:repeat(${Math.min(bot.length,4)},1fr);gap:5px;">
            ${bot.map(p => getImgTag(p, BASE+'aspect-ratio:4/3;')).join('')}
          </div>` : ''}
        </div>`;

      } else if (layout === 'strip') {
        grid = `<div style="display:grid;grid-template-columns:repeat(${Math.min(pg.length,5)},1fr);gap:5px;">
          ${pg.map(p => getImgTag(p, BASE+'aspect-ratio:3/4;')).join('')}
        </div>`;

      } else {
        const cols = getPhotoCols(pg.length);
        grid = `<div class="doc-photos cols-${cols}">
          ${pg.map(p => getImgTag(p, '')).join('')}
        </div>`;
      }

      return `<div class="doc-photos-section${isFirst?'':' doc-photos-next-page'}">${label}${grid}</div>`;
    }).join('');
  }

  const photosHTML = buildPhotosHTML(r.photos, r.photoLayout);

// Generate & save
async function generateDoc() {
  if (!validate()) return;
  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('btnText');
  const btnIcon = document.getElementById('btnIcon');
  const status = document.getElementById('statusMsg');
  btn.disabled = true;
  btnIcon.innerHTML = '<div class="spinner"></div>';
  btnText.textContent = 'กำลังบันทึก...';
  status.textContent = ''; status.className = 'status-msg';

  try {
    const g = id => document.getElementById(id).value.trim();
    const record = {
      id: Date.now(), createdAt: new Date().toISOString(),
      docNumber: g('docNumber'), jobNumber: g('jobNumber'), date: g('date'),
      jobName: g('jobName'), rev: g('rev') || '00.',
      customerCode: g('customerCode'), customerName: g('customerName'),
      boilerType: g('boilerType') || '-', brand: g('brand') || '-',
      capacity: g('capacity') || '-', mfgYear: g('mfgYear') || '-',
      fuel: g('fuel') || '-', workingPressure: g('workingPressure') || '-',
      scope: g('scope'), equipment: g('equipment') || '', engineer: g('engineer') || '',
      sigImg: localStorage.getItem('tpe_sig') || SIG_DEFAULT,
      photoLayout: currentLayout,
      equipment: g('equipment') || '',
      photos: photos.map(p => ({ dataUrl: p.dataUrl, position: p.position }))
    };

    // engineer ถูก set ผ่าน profile selector แล้ว

    // ถ้าเป็นการแก้ไข ลบ record เดิมก่อน
    if (window._editingId) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'delete', id: window._editingId }),
          headers: { 'Content-Type': 'text/plain' }
        });
      } catch(e) {}
      window._editingId = null;
    }
    // Save to Sheet
    btnText.textContent = 'กำลังบันทึกลง Sheet...';
    try {
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(record),
        headers: { 'Content-Type': 'text/plain' }
      });
    } catch(e) { console.warn('Sheet save failed (will save locally)', e); }

    // Save metadata (ไม่มีรูป) ลง localStorage
    const meta = Object.assign({}, record);
    delete meta.photos;
    delete meta.sigImg;
    const localMeta = JSON.parse(localStorage.getItem('tpe_deliveries_meta') || '[]');
    localMeta.unshift(meta);
    try { localStorage.setItem('tpe_deliveries_meta', JSON.stringify(localMeta.slice(0, 200))); } catch(e) {}
    updateBadge();

    // Show preview
    openPreview(record);

    status.textContent = '✅ บันทึกสำเร็จ';
    status.className = 'status-msg success';

    // Reset
    ['docNumber','jobNumber','jobName','customerCode','customerName','scope',
     'boilerType','brand','capacity','mfgYear','fuel','workingPressure'].forEach(id => document.getElementById(id).value = '');
    photos = []; renderGrid();

  } catch(err) {
    status.textContent = '❌ ' + err.message;
    status.className = 'status-msg error';
  } finally {
    btn.disabled = false; btnIcon.textContent = '📋';
    btnText.textContent = 'ดูตัวอย่างและบันทึก';
  }
}

function getDocStyles() {
  // ดึง CSS ที่เกี่ยวกับ document จาก stylesheet ปัจจุบัน
  let styles = '';
  try {
    for (const sheet of document.styleSheets) {
      try {
        for (const rule of sheet.cssRules) {
          const txt = rule.cssText || '';
          if (txt.includes('doc-') || txt.includes('print-') ||
              txt.includes('cell-') || txt.includes('.doc')) {
            styles += txt + '\n';
          }
        }
      } catch(e) {}
    }
  } catch(e) {}
  return styles;
}

// ===== ENGINEER PROFILES =====
let currentEngSig = '';
let selectedEngId = null;

function getEngineers() {

}
function saveEngineers(arr) {
  localStorage.setItem('tpe_engineers', JSON.stringify(arr));

function renderEngSelector() {
  const engineers = getEngineers();
  const sel = document.getElementById('engSelector');
  sel.innerHTML = engineers.map(e => `
    <div class="eng-avatar ${selectedEngId === e.id ? 'selected' : ''}"
         onclick="selectEngineer(${e.id})" ondblclick="openEngModal(${e.id})">

        ? `<img src="${e.sig}" class="eng-avatar-sig" alt="">`
        : `<div class="eng-avatar-sig-placeholder">✍</div>`}
      <div class="eng-avatar-name">${e.name.split(' ').slice(-1)[0] || e.name}</div>
    </div>`).join('') +
    `<button class="eng-add-btn" onclick="openEngModal(null)">
      <span class="eng-add-icon">＋</span>
      <span>เพิ่มใหม่</span>
    </button>`;
}

function selectEngineer(id) {
  const engineers = getEngineers();
  const eng = engineers.find(e => e.id === id);
  if (!eng) return;
  selectedEngId = id;
  document.getElementById('engineer').value = eng.name;
  // บันทึก sig ที่จะใช้
  localStorage.setItem('tpe_sig', eng.sig || '');
  renderEngSelector();
}

function openEngModal(id) {
  document.getElementById('engModal').classList.remove('hidden');
  document.getElementById('engSigPreview').style.display = 'none';
  document.getElementById('engSigPlaceholder').style.display = 'block';
  document.getElementById('engSigInput').value = '';
  currentEngSig = '';

  if (id) {
    const eng = getEngineers().find(e => e.id === id);
    if (!eng) return;
    document.getElementById('engModalTitle').textContent = 'แก้ไขวิศวกร';
    document.getElementById('engEditId').value = id;
    document.getElementById('engName').value = eng.name;
    document.getElementById('engDelBtn').style.display = 'block';
    if (eng.sig) {
      currentEngSig = eng.sig;
      document.getElementById('engSigPreview').src = eng.sig;
      document.getElementById('engSigPreview').style.display = 'block';
      document.getElementById('engSigPlaceholder').style.display = 'none';
    }
  } else {
    document.getElementById('engModalTitle').textContent = 'เพิ่มวิศวกร';
    document.getElementById('engEditId').value = '';
    document.getElementById('engName').value = '';
    document.getElementById('engDelBtn').style.display = 'none';
  }
}

function closeEngModal() {
  document.getElementById('engModal').classList.add('hidden');
}

function handleEngSigUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentEngSig = ev.target.result;
    document.getElementById('engSigPreview').src = currentEngSig;
    document.getElementById('engSigPreview').style.display = 'block';
    document.getElementById('engSigPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function saveEngineer() {
  const name = document.getElementById('engName').value.trim();
  if (!name) { document.getElementById('engName').focus(); return; }
  const editId = parseInt(document.getElementById('engEditId').value) || null;
  const engineers = getEngineers();

  if (editId) {
    const idx = engineers.findIndex(e => e.id === editId);
    if (idx >= 0) {
      engineers[idx].name = name;
      if (currentEngSig) engineers[idx].sig = currentEngSig;
    }
  } else {
    engineers.push({ id: Date.now(), name, sig: currentEngSig });
  }
  saveEngineers(engineers);
  closeEngModal();
  renderEngSelector();
  // auto-select ที่เพิ่ง save
  if (!editId) {
    const last = getEngineers().slice(-1)[0];
    if (last) selectEngineer(last.id);
  } else {
    if (selectedEngId === editId) selectEngineer(editId); // refresh
  }
}

function deleteEngineer() {
  const id = parseInt(document.getElementById('engEditId').value);
  if (!id || !confirm('ลบวิศวกรคนนี้?')) return;
  saveEngineers(getEngineers().filter(e => e.id !== id));
  if (selectedEngId === id) {
    selectedEngId = null;

// ===== PHOTO POSITION =====
let selectedPhotoEl = null;
let photoPositions = {}; // key: photo index, value: {x, y} percent

function initPhotoClicks() {
  // เพิ่ม click listener ให้รูปใน modal
  const modalBody = document.getElementById('modalBody');
  if (!modalBody) return;
  modalBody.querySelectorAll('.doc-photos img').forEach((img, i) => {
    img.addEventListener('click', e => {
      e.stopPropagation();
      // deselect อื่น
      modalBody.querySelectorAll('.doc-photos img').forEach(el => el.classList.remove('selected-photo'));
      img.classList.add('selected-photo');
      selectedPhotoEl = img;
      // แสดง toolbar ใกล้ๆ รูป
      const toolbar = document.getElementById('photoPosToolbar');
      const rect = img.getBoundingClientRect();
      toolbar.style.top = (rect.top + window.scrollY - 50) + 'px';
      toolbar.style.left = rect.left + 'px';
      toolbar.classList.remove('hidden');
    });
  });
}

function movePhoto(dir) {
  if (!selectedPhotoEl) return;
  const step = 10;
  const cur = selectedPhotoEl.style.objectPosition || 'center center';
  let [x, y] = parsePosition(cur);
  if (dir === 'left')   x = Math.max(0,   x - step);
  if (dir === 'right')  x = Math.min(100, x + step);
  if (dir === 'up')     y = Math.max(0,   y - step);
  if (dir === 'down')   y = Math.min(100, y + step);
  if (dir === 'center') { x = 50; y = 50; }
  selectedPhotoEl.style.objectPosition = x + '% ' + y + '%';
}

function parsePosition(pos) {
  const parts = pos.trim().split(/\s+/);
  const parse = v => {
    if (v === 'center') return 50;
    if (v === 'top' || v === 'left') return 0;
    if (v === 'bottom' || v === 'right') return 100;
    return parseInt(v) || 50;
  };
  return [parse(parts[0] || 'center'), parse(parts[1] || 'center')];
}

function closePhotoPos() {
  document.getElementById('photoPosToolbar').classList.add('hidden');
  if (selectedPhotoEl) selectedPhotoEl.classList.remove('selected-photo');
  selectedPhotoEl = null;
}

// ===== AUTOCOMPLETE =====
let acActiveIdx = -1;

function getCustomerHistory() {
  // ดึงรายชื่อลูกค้าที่ไม่ซ้ำจาก localStorage
  const records = (window._allRecords || JSON.parse(localStorage.getItem('tpe_deliveries_meta') || '[]'));
  const seen = new Map();
  records.forEach(r => {
    if (r.customerCode && r.customerName) {
      const key = r.customerCode.trim();
      if (!seen.has(key)) {
        seen.set(key, { code: r.customerCode.trim(), name: r.customerName.trim() });
      }
    }
  });
  return Array.from(seen.values());
}

function acSearch(fieldId) {
  const input = document.getElementById(fieldId);
  const drop  = document.getElementById('ac_' + fieldId);
  const q     = input.value.trim().toLowerCase();
  const customers = getCustomerHistory();

  // filter ตาม field ที่พิมพ์
  const filtered = customers.filter(c =>
    fieldId === 'customerCode'
      ? c.code.toLowerCase().includes(q) || c.name.toLowerCase().includes(q)
      : c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q)
  );

  if (filtered.length === 0) { drop.style.display = 'none'; return; }

  acActiveIdx = -1;
  drop.innerHTML = filtered.slice(0, 8).map((c, i) =>
    `<div class="autocomplete-item" data-idx="${i}"
       onmousedown="acSelect('${c.code.replace(/'/g,"\'")}','${c.name.replace(/'/g,"\'")}')">
      <span class="ac-code">${c.code}</span>
      <span class="ac-name">${c.name}</span>
    </div>`
  ).join('');
  drop.style.display = 'block';
}

function acSelect(code, name) {
  document.getElementById('customerCode').value = code;
  document.getElementById('customerName').value = name;
  document.getElementById('ac_customerCode').style.display = 'none';
  document.getElementById('ac_customerName').style.display = 'none';
  acActiveIdx = -1;
}

function acKey(e, fieldId) {
  const drop  = document.getElementById('ac_' + fieldId);
  const items = drop.querySelectorAll('.autocomplete-item');
  if (!items.length || drop.style.display === 'none') return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActiveIdx = Math.min(acActiveIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActiveIdx = Math.max(acActiveIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIdx));
  } else if (e.key === 'Enter' && acActiveIdx >= 0) {
    e.preventDefault();
    items[acActiveIdx].dispatchEvent(new MouseEvent('mousedown'));
  } else if (e.key === 'Escape') {
    drop.style.display = 'none';
  }
}

// ปิด dropdown เมื่อคลิกที่อื่น
document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.querySelectorAll('.autocomplete-list').forEach(d => d.style.display = 'none');
  }
});

// ===== BILLING SYSTEM =====
let billFilter = 'all';
let billRecords = [];

const BILL_STATUS = {
  draft:    { label: '📝 ร่าง',      cls: 'status-draft',    order: 0 },
  bill1:    { label: '🟡 งวด 1',     cls: 'status-bill1',    order: 1 },
  bill2:    { label: '🔵 งวด 2',     cls: 'status-bill2',    order: 2 },
  complete: { label: '✅ ครบแล้ว',  cls: 'status-complete', order: 3 },
};

const PCT_OPTIONS = [100, 30, 40, 50, 60, 70];

function getBillingData() {
  try { return JSON.parse(localStorage.getItem('tpe_billing') || '{}'); } catch(e) { return {}; }
}
function saveBillingData(data) {
  try { localStorage.setItem('tpe_billing', JSON.stringify(data)); } catch(e) {}
}

function markAsPrinted(id) {
  if (!id) return;
  const billing = getBillingData();
  if (!billing[id]) billing[id] = { status: 'draft', pct1: 60, pct2: 40, printedAt: null };
  if (!billing[id].printedAt) {
    billing[id].printedAt = new Date().toISOString();
    // อัพเดทสถานะเป็น bill1 อัตโนมัติถ้ายังเป็น draft
    if (billing[id].status === 'draft') billing[id].status = 'bill1';
    saveBillingData(billing);
    // sync ไป Sheet
    syncBillingToSheet(id, billing[id]);
    updateBillBadge();
    // refresh หน้า billing ถ้าเปิดอยู่
    if (document.getElementById('panelBilling').classList.contains('active')) {
      renderBillingList();
    }
  }
}

async function syncBillingToSheet(id, billData) {
  if (!API_URL || API_URL.includes('YOUR_APPS')) return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'updateBilling', id, billing: billData })
    });
  } catch(e) { console.warn('Billing sync failed:', e.message); }
}

function updateBillBadge() {
  const billing = getBillingData();
  const pending = Object.values(billing).filter(b => b.status !== 'complete').length;
  document.getElementById('billBadge').textContent = pending || '';
}

function setBillFilter(f) {
  billFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
  renderBillingList();
}

async function loadAndRenderBilling() {
  // ใช้ _allRecords ที่มีอยู่แล้ว (โหลดจาก Sheet)
  if (!window._allRecords || window._allRecords.length === 0) {
    await loadAndRenderHistory(); // trigger load ถ้ายังไม่มี
  }
  billRecords = window._allRecords || [];
  renderBillingSummary();
  renderBillingList();
  updateBillBadge();
}

function renderBillingSummary() {
  const billing = getBillingData();
  const counts = { draft: 0, bill1: 0, bill2: 0, complete: 0 };
  billRecords.forEach(r => {
    const b = billing[String(r.id)];
    const status = b ? b.status : 'draft';
    counts[status] = (counts[status] || 0) + 1;
  });
  document.getElementById('billSummary').innerHTML = `
    <div class="summary-chip chip-draft">📝 ร่าง ${counts.draft}</div>
    <div class="summary-chip chip-bill1">🟡 งวด 1 ${counts.bill1}</div>
    <div class="summary-chip chip-bill2">🔵 งวด 2 ${counts.bill2}</div>
    <div class="summary-chip chip-complete">✅ ครบ ${counts.complete}</div>`;
}

function renderBillingList() {
  const billing = getBillingData();
  let records = [...billRecords];

  if (billFilter !== 'all') {
    records = records.filter(r => {
      const b = billing[String(r.id)];
      return (b ? b.status : 'draft') === billFilter;
    });
  }

  const list = document.getElementById('billList');
  if (!records.length) {
    list.innerHTML = '<div class="hist-empty"><div class="e-icon">📭</div><div>ไม่มีรายการ</div></div>';
    return;
  }

  list.innerHTML = records.map(r => {
    const b = billing[String(r.id)] || { status: 'draft', pct1: 60, pct2: 40, printedAt: null };
    const st = BILL_STATUS[b.status] || BILL_STATUS.draft;
    const pct2 = 100 - (b.pct1 || 60);
    const printedText = b.printedAt
      ? `<span class="bill-printed yes">🖨 พิมพ์แล้ว ${formatDate(b.printedAt)}</span>`
      : '<span class="bill-printed">ยังไม่ได้พิมพ์</span>';

    const pctOptions = PCT_OPTIONS.map(p => `<option value="${p}" ${p == b.pct1 ? 'selected' : ''}>${p}%</option>`).join('');
    const statusOptions = Object.entries(BILL_STATUS).map(([k,v]) =>
      `<option value="${k}" ${k === b.status ? 'selected' : ''}>${v.label}</option>`).join('');

    return `<div class="bill-item" id="bill_${r.id}">
      <div class="bill-header">
        <div class="bill-doc-num">${r.docNumber || '—'}</div>
        <div class="bill-info">
          <div class="bill-title">${r.customerName || '—'} · ${r.jobName || '—'}</div>
          <div class="bill-meta">Job ${r.jobNumber || '—'} | ${formatDate(r.date)} | ${printedText}</div>
        </div>
        <span class="status-badge ${st.cls}">${st.label}</span>
      </div>
      <div class="bill-status-wrap">
        <div class="bill-controls">
          <label style="font-size:11px;color:var(--label);">สถานะ:</label>
          <select class="bill-select" id="status_${r.id}" onchange="updateBillStatus('${r.id}')">
            ${statusOptions}
          </select>
        </div>
        <div class="bill-controls">
          <label style="font-size:11px;color:var(--label);">งวด 1:</label>
          <select class="bill-select" id="pct1_${r.id}" onchange="updateBillPct('${r.id}')">
            ${pctOptions}
          </select>
          <span style="font-size:11px;color:var(--muted);">| งวด 2: ${pct2}%</span>
        </div>
        <button class="btn-bill btn-bill-save" onclick="saveBillStatus('${r.id}')">💾 บันทึก</button>
      </div>
    </div>`;
  }).join('');
}

function updateBillPct(id) {
  const pct1El = document.getElementById('pct1_' + id);
  if (!pct1El) return;
  const pct2 = 100 - parseInt(pct1El.value);
  // แสดง pct2 real-time
  const wrap = pct1El.closest('.bill-controls');
  if (wrap) {
    const pct2span = wrap.querySelector('span');
    if (pct2span) pct2span.textContent = '| งวด 2: ' + pct2 + '%';
  }
}

async function saveBillStatus(id) {
  const statusEl = document.getElementById('status_' + id);
  const pct1El   = document.getElementById('pct1_' + id);
  if (!statusEl || !pct1El) return;

  const billing = getBillingData();
  if (!billing[id]) billing[id] = { status: 'draft', pct1: 60, printedAt: null };
  billing[id].status = statusEl.value;
  billing[id].pct1   = parseInt(pct1El.value);
  billing[id].updatedAt = new Date().toISOString();
  saveBillingData(billing);

  // sync ไป Sheet
  await syncBillingToSheet(id, billing[id]);

  // refresh UI
  renderBillingSummary();
  renderBillingList();
  updateBillBadge();

  // flash feedback
  const btn = document.querySelector(`#bill_${id} .btn-bill-save`);
  if (btn) { btn.textContent = '✅ บันทึกแล้ว'; setTimeout(() => btn.textContent = '💾 บันทึก', 1500); }
}

function updateBillStatus(id) {} // placeholder สำหรับ onchange

function updateBadge() {
  const n = (window._allRecords || JSON.parse(localStorage.getItem('tpe_deliveries_meta') || '[]')).length;
  document.getElementById('histBadge').textContent = n;
}

function renderHistory() {
  const q = (document.getElementById('histSearch').value || '').toLowerCase();
  let records = (window._allRecords || JSON.parse(localStorage.getItem('tpe_deliveries_meta') || '[]'));
  if (q) records = records.filter(r =>
    (r.customerName||'').toLowerCase().includes(q) ||
    (r.docNumber||'').includes(q) ||
    (r.jobNumber||'').includes(q) ||
    (r.jobName||'').toLowerCase().includes(q));
  const list = document.getElementById('histList');
  if (!records.length) {
    list.innerHTML = `<div class="hist-empty"><div class="e-icon">📭</div><div>${q ? 'ไม่พบที่ตรงกัน' : 'ยังไม่มีเอกสาร'}</div></div>`;
    return;
  }
  list.innerHTML = records.map(r => {
    const dt = new Date(r.createdAt);
    const ds = String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
    return `<div class="hist-item">
      <div class="hist-num">SA/${r.docNumber||'—'}</div>
      <div class="hist-info">
        <div class="hist-title">${r.customerName||'—'} · ${r.jobName||'—'}</div>
        <div class="hist-meta">Job ${r.jobNumber||'—'} | ${ds} | 📷 ${(r.photos||[]).length} รูป</div>
      </div>
      <div class="hist-actions">
        <button class="btn-sm btn-view"  onclick="openPreviewById(${r.id})">👁 ดู</button>
        <button class="btn-sm btn-print" onclick="printById(${r.id})">🖨 พิมพ์</button>
        <button class="btn-sm btn-edit"  onclick="editRecord(${r.id})">✏️ แก้ไข</button>
        <button class="btn-sm btn-copy"  onclick="copyRecord(${r.id})">📋 คัดลอก</button>
        <button class="btn-sm btn-del"   onclick="deleteRecord(${r.id})">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function openPreviewById(id) {
  const r = (window._allRecords || []).find(x => String(x.id) === String(id));
  if (r) openPreview(r);
}

function printById(id) {
  const r = (window._allRecords || []).find(x => String(x.id) === String(id));
  if (!r) return;
  currentRecord = r;
  printDoc();
}

function loadRecordToForm(r) {
  const fields = ['docNumber','jobNumber','date','jobName','rev',
    'customerCode','customerName','boilerType','brand','capacity',
    'mfgYear','fuel','workingPressure','scope','equipment','engineer'];
  fields.forEach(f => {
    const el = document.getElementById(f);
    if (el) el.value = r[f] || '';
  });
  photos = (r.photos || []).map(p => ({ dataUrl: p.dataUrl, position: p.position }));
  if (r.photoLayout) { currentLayout = r.photoLayout; setLayout(r.photoLayout); }
  renderGrid();
  if (r.engineer) {
    const engs = getEngineers();
    const match = engs.find(e => e.name === r.engineer);
    if (match) selectEngineer(match.id);
    else document.getElementById('engineer').value = r.engineer;
  }
}

function editRecord(id) {
  const r = (window._allRecords || []).find(x => String(x.id) === String(id));
  if (!r) { alert('ไม่พบข้อมูล กรุณาเปิดแท็บประวัติใหม่อีกครั้ง'); return; }
  loadRecordToForm(r);
  window._editingId = String(id);
  switchTab('form');
  document.getElementById('statusMsg').textContent = '✏️ โหลดข้อมูลแล้ว — แก้ไขแล้วกดสร้างใหม่';
  document.getElementById('statusMsg').className = 'status-msg success';
}

function copyRecord(id) {
  const r = (window._allRecords || []).find(x => String(x.id) === String(id));
  if (!r) { alert('ไม่พบข้อมูล กรุณาเปิดแท็บประวัติใหม่อีกครั้ง'); return; }
  loadRecordToForm(r);
  document.getElementById('docNumber').value = '';
  window._editingId = null;
  switchTab('form');
  document.getElementById('statusMsg').textContent = '📋 คัดลอกแล้ว — กรอกเลขที่เอกสารใหม่แล้วกดสร้าง';
  document.getElementById('statusMsg').className = 'status-msg success';
}
function deleteRecord(id, silent) {
  if (!silent && !confirm('ลบเอกสารนี้?')) return;
  window._allRecords = (window._allRecords || []).filter(r => String(r.id) !== String(id));
  const meta = window._allRecords.map(r => { const m = Object.assign({},r); delete m.photos; delete m.sigImg; return m; });
  try { localStorage.setItem('tpe_deliveries_meta', JSON.stringify(meta)); } catch(e) {}
  updateBadge(); renderHistory();
  // ลบใน Sheet ด้วย
  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', id: id }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(e => console.warn('Delete sync failed:', e));
}

function clearAll() {
  if (!confirm('ลบประวัติทั้งหมด? (ข้อมูลใน Sheet ยังอยู่)')) return;
  localStorage.removeItem('tpe_deliveries_meta');
  window._allRecords = [];
  updateBadge(); renderHistory();
}
